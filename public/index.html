<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seat Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #4a5568;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 30px;
        }
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .seat {
            background: #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            position: relative;
            overflow: hidden;
        }
        .seat:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .seat:hover:before {
            transform: translateX(100%);
        }
        .seat.available {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            box-shadow: 0 8px 15px rgba(72, 187, 120, 0.3);
        }
        .seat.available:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(72, 187, 120, 0.4);
        }
        .seat.booked {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
            box-shadow: 0 8px 15px rgba(245, 101, 101, 0.3);
            cursor: not-allowed;
        }
        .seat.loading {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .seat-number {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .seat-status {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.4);
        }
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                margin: 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .seats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 Seat Booking System</h1>
        <p class="subtitle">Select your preferred seat and book instantly!</p>
        <div class="seats-grid" id="seats"></div>
        <div class="message" id="message"></div>
        <button class="refresh-btn" onclick="loadSeats()">🔄 Refresh Seats</button>
    </div>

    <script>
        const seatsContainer = document.getElementById('seats');
        const messageDiv = document.getElementById('message');

        async function loadSeats() {
            seatsContainer.innerHTML = '<div class="seat loading"><div class="seat-number">Loading...</div></div>'.repeat(5);
            try {
                const response = await fetch('/api/seats');
                const seats = await response.json();
                renderSeats(seats);
            } catch (error) {
                showMessage('Failed to load seats. Please try again.', 'error');
                seatsContainer.innerHTML = '';
            }
        }

        function renderSeats(seats) {
            seatsContainer.innerHTML = '';
            for (const [id, status] of Object.entries(seats)) {
                const seat = document.createElement('div');
                seat.className = `seat ${status}`;
                seat.innerHTML = `
                    <div class="seat-number">Seat ${id}</div>
                    <div class="seat-status">${status.charAt(0).toUpperCase() + status.slice(1)}</div>
                `;
                if (status === 'available') {
                    seat.onclick = () => bookSeat(id, seat);
                }
                seatsContainer.appendChild(seat);
            }
        }

        async function bookSeat(id, seatElement) {
            seatElement.classList.add('loading');
            seatElement.onclick = null;
            seatElement.innerHTML = '<div class="seat-number">Booking...</div>';

            try {
                const response = await fetch(`/api/book/${id}`, { method: 'POST' });
                const result = await response.json();
                showMessage(result.message, response.ok ? 'success' : 'error');
                if (response.ok) {
                    loadSeats();
                } else {
                    seatElement.classList.remove('loading');
                    seatElement.onclick = () => bookSeat(id, seatElement);
                    seatElement.innerHTML = `
                        <div class="seat-number">Seat ${id}</div>
                        <div class="seat-status">Available</div>
                    `;
                }
            } catch (error) {
                showMessage('Booking failed. Please try again.', 'error');
                seatElement.classList.remove('loading');
                seatElement.onclick = () => bookSeat(id, seatElement);
                seatElement.innerHTML = `
                    <div class="seat-number">Seat ${id}</div>
                    <div class="seat-status">Available</div>
                `;
            }
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        loadSeats();
    </script>
</body>
</html>
